<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Онлайн результати</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,sans-serif;color:#17182f;
       background:radial-gradient(circle at top right,rgba(79,97,216,.16),transparent 34%),linear-gradient(180deg,#f6f9ff,#edf5ff);
       min-height:100vh;padding:22px 14px}
  .wrap{max-width:1100px;margin:0 auto}
  .card{padding:20px;border:1px solid rgba(48,52,155,.14);border-radius:22px;
        background:rgba(255,255,255,.82);box-shadow:0 14px 34px rgba(28,45,96,.08)}
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  h1{margin:0;font-size:20px}
  .sub{margin:2px 0 0;color:#5d6780;font-size:12px}
  .live{display:inline-flex;align-items:center;gap:6px;color:#2f9e5c;font-size:12px;font-weight:700}
  .dot{width:8px;height:8px;border-radius:999px;background:#2f9e5c;animation:p 1.6s infinite}
  .live.off{color:#9aa2b8}
  .live.off .dot{background:#9aa2b8;animation:none}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(47,158,92,.5)}70%{box-shadow:0 0 0 9px rgba(47,158,92,0)}100%{box-shadow:0 0 0 0 rgba(47,158,92,0)}}

  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0 6px}
  .day{display:flex;gap:6px}
  .day button{padding:7px 14px;border:1px solid rgba(48,52,155,.22);border-radius:10px;background:#fff;
              color:#30349b;font-size:13px;font-weight:700;cursor:pointer}
  .day button.on{background:linear-gradient(135deg,#222a92,#3d42c8);color:#fff;border-color:transparent}
  input.q{margin-left:auto;padding:8px 12px;border:1px solid rgba(48,52,155,.22);border-radius:10px;
          font-size:14px;flex:1 1 180px;max-width:280px}

  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 4px;padding-bottom:10px;
        border-bottom:1px solid rgba(48,52,155,.12)}
  .tabs a{padding:5px 11px;border-radius:999px;font-size:13px;text-decoration:none;cursor:pointer;
          color:#30349b;background:#eef0fb;font-weight:700}
  .tabs a.on{background:linear-gradient(135deg,#222a92,#3d42c8);color:#fff}

  .ghead{margin:20px 0 8px;text-align:center}
  .ghead b{color:#c0392b;font-size:17px}
  .ghead span{color:#5d6780;font-size:13px}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;
        box-shadow:0 8px 20px rgba(28,45,96,.06)}
  th,td{padding:9px 12px;text-align:left;font-size:13px;border-bottom:1px solid #eef0fb}
  th{background:#e9ecf6;color:#3a3f63;font-size:12px;font-weight:700}
  tr:nth-child(even) td{background:#fafbff}
  .rk{font-weight:900;width:46px;text-align:center}
  .gold{color:#b8860b}.silver{color:#7a7a8c}.bronze{color:#a8682b}
  .time{font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap}
  .pts{font-variant-numeric:tabular-nums;font-weight:800;text-align:right;white-space:nowrap;color:#222a92}
  .pts.win{color:#2f9e5c}
  .total{font-variant-numeric:tabular-nums;font-weight:900;text-align:right;white-space:nowrap;color:#c0392b}
  .daycell{white-space:nowrap}
  .daycell .pl{font-weight:900;color:#3a3f63}
  .daycell .tm{color:#5d6780;font-size:12px}
  .flag{color:#c0392b;font-weight:800;font-size:12px}
  .b-running{color:#30349b;font-weight:700;font-size:12px}
  .empty{padding:34px;text-align:center;color:#5d6780}
  .upd{margin-top:12px;color:#9aa2b8;font-size:11px;text-align:right}

  /* Таблиця може горизонтально скролитись, якщо все одно не влазить. */
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* --- Мобільний (екран до 560px) --- */
  @media (max-width:560px){
    body{padding:12px 8px}
    .card{padding:14px;border-radius:16px}
    h1{font-size:17px}
    /* На вузькому екрані ховаємо найменш важливі колонки: № і Старт. */
    .col-bib, .col-start{display:none}
    /* У «Сумі» на мобільному лишаємо тільки № + бали днів + сума: ховаємо місце/час. */
    .col-detail{display:none}
    th,td{padding:8px 8px;font-size:13px}
    .rk{width:38px}
    .ghead b{font-size:16px}
    .tabs a{font-size:12px;padding:5px 9px}
    .day button{padding:6px 11px;font-size:12px}
    input.q{margin-left:0;max-width:none;flex:1 1 100%}
    .upd{text-align:left}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="top">
      <div><h1 id="title">Онлайн результати</h1><p class="sub" id="meta">Завантаження…</p></div>
      <span class="live" id="live"><span class="dot"></span>наживо</span>
    </div>

    <div class="bar">
      <div class="day" id="days"></div>
      <input class="q" id="q" placeholder="Пошук: ПІБ / команда / №…">
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="content"><div class="empty">Завантаження…</div></div>
    <div class="upd" id="upd"></div>
  </div>
</div>

<script>
// ========================================================================
//  Встав дані свого Supabase-проекту:
//    Dashboard → Project Settings → API → Project URL + anon public ключ.
//  anon-ключ публічний і безпечний (RLS дозволяє лише читання).
// ========================================================================
const SUPABASE_URL  = "https://ayltwyedqgdzjckgdcgv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF5bHR3eWVkcWdkempja2dkY2d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNjMzMTYsImV4cCI6MjA5NTYzOTMxNn0.piQSoL4H2HJPHuCWbepkCucVwf9MmYnoF-J8Zx9i_n8";

// Порядок статусів у групі: фініш (за місцем) → біжать → зняті → не старт.
// Порядок у групі: фініш (за місцем) → ще обробляються → біжать → зняті → не старт.
const STATUS_ORDER = { finished:0, finished_pending:1, running:2, dnf:3, dsq:4, dns:5 };

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);

// Тягнемо лише ті колонки, що реально показує/використовує сторінка
// (не *), щоб зменшити трафік. Пропущені: finish_time, region, birth, qual.
const RES_COLS  = 'bib,grp,day,rk,full_name,team,club,status,reason,start_time,result_time,result_seconds,points,updated_at';
// Для «Суми» час старту/команда в деталях не критичні, але лишаємо team для пошуку.
const GRP_COLS  = 'name,controls,distance_km,ord';

const params = new URLSearchParams(location.search);
const eventId = params.get('event') || '';   // ?event=kyiv2025
let day = Number(params.get('day')) || 1;     // ?day=1
let activeGrp = '';      // '' = перша група за порядком
let sumMode = params.get('sum') === '1';       // ?sum=1 — одразу відкрити залік
let results = [], groups = [], event = null, eventDays = [];
let allResults = [];     // результати ВСІХ днів (для режиму «Сума»)

// --- Авто-офлайн: якщо час останньої синхронізації не змінюється N опитувань
//     поспіль — вважаємо змагання завершеним, спиняємо polling+realtime.
//     Поновлення — лише перезавантаженням сторінки (F5).
const STALE_LIMIT = 4;   // скільки опитувань поспіль без змін → офлайн
let lastSync = null;     // макс updated_at з останнього непорожнього опитування
let staleCount = 0;
let offline = false;
let pollTimer = null, liveChannel = null;

async function load(){
  if (!eventId){
    $('content').innerHTML = '<div class="empty">Не вказано змагання. Додай у посилання <b>?event=&lt;id&gt;&amp;day=1</b>.</div>';
    $('meta').textContent = '';
    return;
  }
  // Легкі метадані: групи дня (для вкладок/КП), саме змагання, дні.
  const [rGrp, rEv, rDays] = await Promise.all([
    sb.from('groups').select(GRP_COLS).eq('event', eventId).eq('day', day).order('ord'),
    sb.from('events').select('id,title,subtitle,standings').eq('id', eventId).maybeSingle(),
    sb.from('event_days').select('day,label,ord').eq('event', eventId).order('ord'),
  ]);
  const err = rGrp.error || rEv.error || rDays.error;
  if (err){ $('content').innerHTML = `<div class="empty">Помилка: ${err.message}</div>`; return; }
  groups = rGrp.data || [];
  event = rEv.data || null; eventDays = rDays.data || [];

  // Залік доступний лише коли увімкнено standings — інакше скидаємо режим.
  if (!event?.standings) sumMode = false;

  // Визначаємо активну групу ДО завантаження її результатів.
  const names = groupNames();
  if (!names.includes(activeGrp)) activeGrp = names[0] || '';

  if (sumMode){
    // Режим «Сума»: тягнемо лише активну групу, але за ВСІ дні.
    const rAll = await sb.from('results').select(RES_COLS)
      .eq('event', eventId).eq('grp', activeGrp);
    allResults = rAll.error ? [] : (rAll.data || []);
    results = allResults.filter(r => r.day === day);
  } else {
    // Звичайний режим: тягнемо лише відкриту групу поточного дня.
    allResults = [];
    results = activeGrp ? await fetchGroup(activeGrp) : [];
  }

  checkStale();
  renderHeader(); renderDays(); renderTabs(); render(); touch();
}

// Результати однієї групи поточного дня (лише потрібні колонки).
async function fetchGroup(grp){
  const r = await sb.from('results').select(RES_COLS)
    .eq('event', eventId).eq('day', day).eq('grp', grp);
  return r.error ? [] : (r.data || []);
}

// Стежимо за «свіжістю»: якщо макс updated_at не змінився STALE_LIMIT разів
// поспіль — змагання, найімовірніше, завершене → переходимо в офлайн.
function checkStale(){
  const src = (allResults.length ? allResults : results);
  const cur = src.reduce((m, r) => r.updated_at > m ? r.updated_at : m, '');
  if (!cur) return;                       // ще немає даних — не рахуємо стейл
  if (lastSync === null){ lastSync = cur; staleCount = 0; return; }
  if (cur === lastSync){
    if (++staleCount >= STALE_LIMIT) goOffline();
  } else {
    lastSync = cur; staleCount = 0;
  }
}

function goOffline(){
  if (offline) return;
  offline = true;
  if (pollTimer){ clearInterval(pollTimer); pollTimer = null; }
  if (liveChannel){ sb.removeChannel(liveChannel); liveChannel = null; }
  touch();
}

function renderHeader(){
  $('title').textContent = event?.title || 'Онлайн результати';
}

// Динамічний перемикач днів — кнопки з таблиці event_days + (опційно) «Сума».
function renderDays(){
  if (!eventDays.length){ $('days').innerHTML = ''; return; }
  let html = eventDays.map(d =>
    `<button data-day="${d.day}" class="${!sumMode && d.day===day?'on':''}">${esc(dayLabel(d))}</button>`).join('');
  // «Сума» стоїть як окремий «день» поряд із днями — залік за всі дні.
  if (event?.standings)
    html += `<button data-sum="1" class="${sumMode?'on':''}">Σ Сума</button>`;
  $('days').innerHTML = html;

  $('days').querySelectorAll('button[data-day]').forEach(btn => btn.onclick = () => {
    if (!sumMode && Number(btn.dataset.day) === day) return;
    sumMode = false;
    day = Number(btn.dataset.day);
    // Оновлюємо URL (щоб посилання на день можна було скопіювати/поділитися).
    const u = new URL(location); u.searchParams.set('day', day); u.searchParams.delete('sum');
    history.replaceState(null, '', u);
    load();   // інший день → дотягуємо його дані
  });
  const sumBtn = $('days').querySelector('button[data-sum]');
  if (sumBtn) sumBtn.onclick = () => {
    if (sumMode) return;
    sumMode = true;
    const u = new URL(location); u.searchParams.set('sum', '1'); history.replaceState(null, '', u);
    load();   // режим суми → дотягуємо всі дні активної групи
  };
}

function dayLabel(d){
  return d.label ? `День ${d.day} · ${d.label}` : `День ${d.day}`;
}

function groupNames(){
  // Вкладки = групи дня з таблиці groups (за алфавітом, українська локаль).
  // Тепер results тягнемо лише для активної групи, тож перелік груп беремо
  // з легкої таблиці groups, а не з результатів.
  return [...new Set(groups.map(g => g.name))]
    .sort((a, b) => a.localeCompare(b, 'uk'));
}

function renderTabs(){
  const names = groupNames();
  if (!names.includes(activeGrp)) activeGrp = names[0] || '';
  $('tabs').innerHTML = names.map(n =>
    `<a data-grp="${esc(n)}" class="${n===activeGrp?'on':''}">${esc(n)}</a>`).join('');
  $('tabs').querySelectorAll('a').forEach(a =>
    a.onclick = () => {
      if (a.dataset.grp === activeGrp) return;
      activeGrp = a.dataset.grp;
      // Миттєвий візуальний відгук: одразу переставляємо клас .on, не чекаючи даних.
      $('tabs').querySelectorAll('a').forEach(x => x.classList.toggle('on', x === a));
      switchGroup();
    });
}

// Перемикання групи: дотягуємо результати лише цієї групи, потім рендеримо.
async function switchGroup(){
  $('content').innerHTML = '<div class="empty">Завантаження…</div>';
  if (sumMode){
    const r = await sb.from('results').select(RES_COLS)
      .eq('event', eventId).eq('grp', activeGrp);
    allResults = r.error ? [] : (r.data || []);
    results = allResults.filter(x => x.day === day);
  } else {
    results = await fetchGroup(activeGrp);
  }
  render(); touch();
}

function render(){
  if (sumMode){ renderSum(); return; }

  const showPts = !!event?.standings;
  const q = $('q').value.trim().toLowerCase();
  let list = results.filter(r => r.grp === activeGrp);
  if (q) list = list.filter(r =>
    (r.full_name||'').toLowerCase().includes(q) ||
    (r.team||'').toLowerCase().includes(q) ||
    (r.club||'').toLowerCase().includes(q) ||
    String(r.bib||'').includes(q));

  if (!list.length){ $('content').innerHTML = '<div class="empty">Немає даних у цій групі</div>'; return; }

  list.sort(cmp);
  const g = groups.find(x => x.name === activeGrp);
  const head = g
    ? `<div class="ghead"><b>${esc(activeGrp)}</b> &nbsp;
         <span>${g.controls?`${g.controls} КП`:''} ${g.distance_km?`&nbsp; ${g.distance_km} км`:''}</span></div>`
    : `<div class="ghead"><b>${esc(activeGrp)}</b></div>`;

  const fin = list.filter(r => r.status==='finished' || r.status==='finished_pending').length;
  const run = list.filter(r => r.status==='running').length;
  const dsq = list.filter(r => r.status==='dsq').length;

  $('content').innerHTML = head + `
    <div class="tbl-scroll"><table>
      <thead><tr>
        <th class="rk">Місце</th><th>Прізвище, ім'я</th><th class="col-bib">№</th>
        <th>Команда</th><th class="col-start">Старт</th><th>Час</th>${showPts?'<th class="pts">Бали</th>':''}
      </tr></thead>
      <tbody>${list.map(r => rowHtml(r, showPts)).join('')}</tbody>
    </table></div>
    <p class="sub" style="margin-top:8px">Фінішували: ${fin} · на дистанції: ${run}${dsq?` · знято: ${dsq}`:''} · усього: ${list.length}</p>`;
}

function rowHtml(r, showPts){
  let rk = '', time = '';
  if (r.status === 'finished'){
    rk = `<span class="${['','gold','silver','bronze'][r.rk]||''}">${r.rk||''}</span>`;
    time = `<span class="time">${esc(r.result_time||'')}</span>`;
  } else if (r.status === 'finished_pending'){
    // Фінішував, місце ще рахується — показуємо час, але без номера місця.
    time = `<span class="time">${esc(r.result_time||'')}</span> <span class="b-running" style="font-size:11px">(обробка)</span>`;
  } else if (r.status === 'running'){
    time = `<span class="b-running">на дистанції</span>`;
  } else if (r.status === 'dsq'){
    // Показуємо причину з U_DAL ("MP", "DNS"…), як на бланку.
    time = `<span class="flag">${esc(r.reason || 'зн.')}</span>`;
  } else if (r.status === 'dns'){
    time = `<span class="b-running" style="color:#9aa2b8">не старт.</span>`;
  }
  const ptsCell = showPts
    ? `<td class="pts${r.points===100?' win':''}">${r.points!=null?fmtPts(r.points):''}</td>`
    : '';
  return `<tr>
    <td class="rk">${rk}</td>
    <td>${esc(r.full_name)}</td>
    <td class="col-bib">${r.bib||''}</td>
    <td>${esc(r.team||'')}</td>
    <td class="time col-start" style="font-weight:400">${esc(r.start_time||'')}</td>
    <td>${time}</td>${ptsCell}
  </tr>`;
}

// Бали завжди з 2 знаками після коми: 100.00, 87.30, 95.42.
function fmtPts(p){
  const n = Number(p);
  if (!isFinite(n)) return '';
  return n.toFixed(2);
}

function cmp(a,b){
  const sa = STATUS_ORDER[a.status] ?? 9, sb_ = STATUS_ORDER[b.status] ?? 9;
  if (sa !== sb_) return sa - sb_;
  if (a.status==='finished'){
    if (a.rk && b.rk) return a.rk - b.rk;
    return (a.result_seconds ?? 1e9) - (b.result_seconds ?? 1e9);
  }
  if (a.status==='finished_pending')   // ще без місця — за часом
    return (a.result_seconds ?? 1e9) - (b.result_seconds ?? 1e9);
  return (a.start_time||'').localeCompare(b.start_time||'');
}

// ----------------------------------------------------------------------
//  Режим «Сума»: окрема «кнопка дня» в ряду днів. Групи лишаються вкладками,
//  тож показуємо залік за всі дні ЛИШЕ для активної групи (activeGrp).
//  Учасник = пара (bib, grp). Колонки: місце | ПІБ | № | команда |
//  [День N: місце · час · бали] × дні | Сума балів.
//  Пропущений/нефінішований день → 0 балів (місце/час — тире).
//  Сортування — за сумою балів, спадання. На мобільному лишаються лише
//  місце + ПІБ + бали кожного дня + сума (решта ховається класом col-detail).
// ----------------------------------------------------------------------
function renderSum(){
  const q = $('q').value.trim().toLowerCase();
  // Перелік днів за порядком (із event_days; запасний варіант — з даних).
  let days = eventDays.length
    ? eventDays.map(d => d.day)
    : [...new Set(allResults.map(r => r.day))].sort((a,b)=>a-b);
  if (!days.length) days = [day];

  // Агрегуємо учасників активної групи: "bib" → { bib, name, team, byDay, total }.
  const m = new Map();
  for (const r of allResults){
    if (r.grp !== activeGrp) continue;
    if (!m.has(r.bib))
      m.set(r.bib, { bib:r.bib, name:r.full_name, team:r.team, byDay:{}, total:0 });
    const p = m.get(r.bib);
    p.byDay[r.day] = r;
    // Найсвіжіше ПІБ/команду беремо з будь-якого дня (можуть бути порожні).
    if (r.full_name) p.name = r.full_name;
    if (r.team) p.team = r.team;
    p.total += Number(r.points) || 0; // бали є лише у фінішерів; решта — 0
  }

  let people = [...m.values()];
  if (q) people = people.filter(p =>
    (p.name||'').toLowerCase().includes(q) ||
    (p.team||'').toLowerCase().includes(q) ||
    String(p.bib).includes(q));

  if (!people.length){ $('content').innerHTML = '<div class="empty">Немає даних для заліку в цій групі</div>'; return; }
  people.sort((a,b)=> b.total - a.total); // за сумою балів, спадання

  const dayHead = days.map(d =>
    `<th class="col-detail">М</th><th class="col-detail">Час</th><th class="pts">Д${d}</th>`).join('');

  const rows = people.map((p, i) => {
    const rank = i + 1;
    const cells = days.map(d => {
      const r = p.byDay[d];
      const fin = r && (r.status==='finished' || r.status==='finished_pending');
      const pl  = (r && r.status==='finished' && r.rk) ? r.rk : '–';
      const tm  = fin ? esc(r.result_time||'') : '–';
      const pts = (r && r.points!=null) ? fmtPts(r.points) : '0';
      const win = (r && r.points===100) ? ' win' : '';
      return `<td class="col-detail daycell"><span class="pl">${pl}</span></td>
              <td class="col-detail daycell"><span class="tm">${tm}</span></td>
              <td class="pts${win}">${pts}</td>`;
    }).join('');
    const medal = ['','gold','silver','bronze'][rank] || '';
    return `<tr>
      <td class="rk"><span class="${medal}">${rank}</span></td>
      <td>${esc(p.name||'')}</td>
      <td class="col-bib">${p.bib||''}</td>
      <td class="col-detail">${esc(p.team||'')}</td>
      ${cells}
      <td class="total">${fmtPts(p.total)}</td>
    </tr>`;
  }).join('');

  $('content').innerHTML = `
    <div class="ghead"><b>${esc(activeGrp)}</b> <span>залік за ${days.length} дн.</span></div>
    <div class="tbl-scroll"><table>
      <thead><tr>
        <th class="rk">Місце</th><th>Прізвище, ім'я</th><th class="col-bib">№</th>
        <th class="col-detail">Команда</th>${dayHead}<th class="total">Сума</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function esc(s){ return String(s).replace(/[&<>"]/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function touch(){
  const last = results.reduce((m,r)=> r.updated_at>m? r.updated_at:m, '');
  const live = $('live');
  if (offline){
    if (live){ live.classList.add('off'); live.lastChild.textContent = 'офлайн'; }
    const at = last ? ' · останнє: ' + new Date(last).toLocaleTimeString('uk-UA') : '';
    $('upd').textContent = `Офлайн — оновіть сторінку (F5), щоб перепідключитись${at}`;
  } else {
    if (live){ live.classList.remove('off'); live.lastChild.textContent = 'наживо'; }
    $('upd').textContent = last ? 'Оновлено: ' + new Date(last).toLocaleTimeString('uk-UA') : '';
  }
  const sub = event?.subtitle ? event.subtitle + ' · ' : '';
  $('meta').textContent = sumMode
    ? `${sub}Залік за всі дні`
    : `${sub}День ${day} · учасників: ${results.length}`;
}

$('q').addEventListener('input', render);

load();

// Realtime (якщо увімкнено в Supabase) + запасне опитування раз на 10 с.
// Обидва зупиняються в goOffline(); перепідключення — перезавантаженням сторінки.
liveChannel = sb.channel('live')
  .on('postgres_changes', { event:'*', schema:'public', table:'results' }, () => { if (!offline) load(); })
  .subscribe();
pollTimer = setInterval(() => { if (!offline) load(); }, 10000);
</script>
</body>
</html>
